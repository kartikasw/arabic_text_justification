name: flutter_arabic_justification
description: "Flutter FFI plugin for Arabic text justification using HarfBuzz shaping and FreeType rasterization."
version: 0.0.1
homepage: https://github.com/kartikasw/flutter_arabic_justification
repository: https://github.com/kartikasw/flutter_arabic_justification
issue_tracker: https://github.com/kartikasw/flutter_arabic_justification/issues

environment:
  sdk: ^3.6.2
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.3
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      ios:
        ffiPlugin: true
  assets:
    - assets/digitalkhatt.otf